<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP ACME - Portal Seguro</title>
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; --text: #334155; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border-top: 5px solid var(--accent); }
        .header { text-align: center; margin-bottom: 30px; }
        .header h2 { margin: 0; color: var(--primary); font-size: 24px; }
        .header p { margin: 5px 0 0; font-size: 14px; color: #64748b; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }
        input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 6px; box-sizing: border-box; font-size: 15px; transition: border-color 0.3s; }
        input:focus { outline: none; border-color: var(--accent); }
        .mfa-box { background: #eff6ff; padding: 15px; border-radius: 6px; border: 1px dashed #93c5fd; margin-bottom: 25px; }
        button { width: 100%; padding: 14px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 15px; transition: opacity 0.3s; margin-bottom: 12px; }
        .btn-auth { background-color: var(--accent); color: white; }
        .btn-data { background-color: var(--primary); color: white; }
        button:hover { opacity: 0.9; }
        #console { margin-top: 20px; padding: 15px; border-radius: 6px; font-family: monospace; font-size: 12px; display: none; white-space: pre-wrap; word-break: break-all; }
        .success { background: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h2>🏢 ERP ACME</h2>
            <p>Control de Acceso de Alta Seguridad</p>
        </div>

        <div class="form-group">
            <label>Usuario</label>
            <input type="text" id="usuario" value="admin">
        </div>
        
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" id="password" value="acme2026">
        </div>

        <div class="mfa-box">
            <label style="color: var(--accent);">Código MFA </label>
            <input type="text" id="mfa" placeholder="Ingresa" value="250424">
        </div>

        <button class="btn-auth" onclick="ejecutarLogin()">1. Validar MFA y Generar JWT</button>
        <button class="btn-data" onclick="consultarAPI()">2. Consultar Base de Datos RDS</button>

        <div id="console"></div>
    </div>

    <script>
        const API_URL = window.location.origin;
        const panel = document.getElementById('console');

        function imprimir(msg, clase) {
            panel.style.display = 'block';
            panel.className = clase;
            panel.innerText = msg;
        }

        async function ejecutarLogin() {
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('password').value;
            const mfa = document.getElementById('mfa').value;

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password, mfa })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    imprimir(`✅ ${data.mensaje}\n\nTOKEN JWT GENERADO:\n${data.token}`, 'success');
                } else {
                    imprimir(`❌ Acceso Denegado:\n${data.mensaje}`, 'error');
                }
            } catch (error) {
                imprimir('❌ Error crítico de red o servidor offline.', 'error');
            }
        }

        async function consultarAPI() {
            const token = localStorage.getItem('token');
            if (!token) {
                imprimir('⚠️ Bloqueo de Middleware:\nNo existe un Token JWT en memoria. Inicie sesión primero.', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_URL}/api/acme/datos`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (res.ok) {
                    imprimir(`🔓 Acceso Concedido (JWT Válido):\n\n${JSON.stringify(data, null, 2)}`, 'success');
                } else {
                    imprimir(`❌ Error de Autorización:\n${data.mensaje}`, 'error');
                }
            } catch (error) {
                imprimir('❌ Fallo al conectar con la ruta protegida.', 'error');
            }
        }
    </script>
</body>
</html>
